<div class="dashboard-container">
  <div class="sidebar">
    <h2>🏫 SchoolManager</h2>
    <nav>
      <a routerLink="/alumnos" routerLinkActive="active">📋 Alumnos</a>
      <a routerLink="/matriculas" routerLinkActive="active">🎓 Matrículas</a>
      <a routerLink="/mensualidades" routerLinkActive="active">💰 Mensualidades</a>
      <a href="#">💳 Pagos</a>
    </nav>
    <button (click)="logout()">🚪 Cerrar sesión</button>
  </div>

  <div class="main-content">
    <h1>Panel de Administración</h1>

    <div class="cards">
      <div class="card azul">
        <h3>Total Alumnos</h3>
        <p class="numero">0</p>
      </div>
      <div class="card verde">
        <h3>Pagos al día</h3>
        <p class="numero">0</p>
      </div>
      <div class="card naranja">
        <h3>Pendientes</h3>
        <p class="numero">0</p>
      </div>
      <div class="card rojo">
        <h3>Vencidos</h3>
        <p class="numero">0</p>
      </div>
    </div>

    <div class="bienvenida">
      <h2>✅ Sistema funcionando correctamente</h2>
      <p>Bienvenido al panel de administración de SchoolManager.</p>
    </div>
  </div>
</div>
